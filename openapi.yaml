openapi: 3.1.0
info:
  title: Kyren Pay API
  description: |
    The Kyren Pay API enables merchants to accept payments from customers worldwide.
    Integrate checkout sessions, manage products, track orders, and handle webhooks.

    **Data types**: The API uses the following types for request/response data:
    - **string**: For text, identifiers, and **all amount/price fields** (e.g. `price`, `amount`, `platformFee`, `available`)
      to avoid floating-point precision issues. Use decimal format like `"9.99"`.
    - **integer**: For counts, pagination, and timestamps
    - **timestamp**: Unix timestamp in milliseconds (integer) for all time fields (e.g. `createdAt`, `paidAt`, `expiresAt`).
      Time parameters (e.g. `startDate`, `endDate`) also use Unix milliseconds.
  version: "1.0.0"
  contact:
    name: Kyren Pay Support
    email: support@kyren.top
    url: https://kyren.top

servers:
  - url: https://api.kyren.top
    description: Production
  - url: https://staging-api.kyren.top
    description: Test / Sandbox

security:
  - ApiKeyAuth: []

tags:
  - name: Config
    description: Retrieve platform configuration such as supported currencies.
  - name: Products
    description: Create and manage products that represent the goods or services you sell.
  - name: Checkouts
    description: Create checkout sessions to collect payments from your customers.
  - name: Orders
    description: View and manage orders created from completed checkout sessions.
  - name: Balance
    description: View your account balance and transaction history.
  - name: Epay Compatibility
    description: |
      Compatibility endpoints for existing integrations built on 易支付 API conventions.
      These endpoints use form/query parameters with `pid + sign` verification (MD5), not `x-api-key` header auth.

paths:
  /v1/config/currencies:
    get:
      operationId: getCurrencies
      tags: [Config]
      summary: Get supported currencies
      description: |
        Returns the list of currencies supported by the platform and the default currency.
        Use this when creating products or configuring pricing to ensure you use a supported currency.
      responses:
        "200":
          description: Supported currencies and default currency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrenciesResponseWrapper"
              example:
                code: 0
                message: "success"
                data:
                  currencies:
                    - code: "USD"
                      label: "USD"
                    - code: "CNY"
                      label: "CNY"
                    - code: "HKD"
                      label: "HKD"
                  defaultCurrency: "USD"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/products:
    post:
      operationId: createProduct
      tags: [Products]
      summary: Create a product
      description: Creates a new product. Products represent the goods or services you sell.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
            example:
              name: "1000 AI Credits"
              description: "Top up 1000 credits for AI API usage"
              price: "9.99"
              currency: "USD"
              metadata:
                credits: "1000"
      responses:
        "200":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponseWrapper"
              example:
                code: 0
                message: "success"
                data:
                  id: "prod_abc123"
                  name: "1000 AI Credits"
                  description: "Top up 1000 credits for AI API usage"
                  image: null
                  price: "9.99"
                  currency: "USD"
                  status: "ACTIVE"
                  metadata:
                    credits: "1000"
                  createdAt: 1736932200000
                  updatedAt: 1736932200000
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      operationId: listProducts
      tags: [Products]
      summary: List all products
      description: Returns a paginated list of your products.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProductStatus"
          description: Filter by product status
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: A paginated list of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponseWrapper"
              example:
                code: 0
                message: "success"
                data:
                  items:
                    - id: "prod_abc123"
                      name: "1000 AI Credits"
                      description: "Top up 1000 credits for AI API usage"
                      image: null
                      price: "9.99"
                      currency: "USD"
                      status: "ACTIVE"
                      metadata:
                        credits: "1000"
                      createdAt: 1736932200000
                      updatedAt: 1736932200000
                  pagination:
                    page: 1
                    size: 20
                    total: 1
                    totalPages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/products/{id}:
    get:
      operationId: getProduct
      tags: [Products]
      summary: Retrieve a product
      description: Retrieves the details of an existing product.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: The product object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponseWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateProduct
      tags: [Products]
      summary: Update a product
      description: Updates an existing product. Only the provided fields will be updated.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
            example:
              name: "2000 AI Credits"
              price: "18.99"
      responses:
        "200":
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponseWrapper"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: archiveProduct
      tags: [Products]
      summary: Archive a product
      description: Archives a product. Archived products cannot be used to create new checkout sessions.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Product archived successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponseWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/checkouts:
    post:
      operationId: createCheckout
      tags: [Checkouts]
      summary: Create a checkout session
      description: |
        Creates a new checkout session for a product. Returns a URL where you can redirect
        your customer to complete the payment. Checkout sessions expire after 30 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
            example:
              productId: "prod_abc123"
              successUrl: "https://example.com/success"
              cancelUrl: "https://example.com/cancel"
              customerEmail: "customer@example.com"
              metadata:
                userId: "user_456"
      responses:
        "200":
          description: Checkout session created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponseWrapper"
              example:
                code: 0
                message: "success"
                data:
                  id: "cs_xyz789"
                  productId: "prod_abc123"
                  amount: "9.99"
                  currency: "USD"
                  status: "OPEN"
                  url: "https://payment.kyren.io/checkout/cs_xyz789"
                  expiresAt: 1736934000000
                  createdAt: 1736932200000
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/checkouts/{id}:
    get:
      operationId: getCheckout
      tags: [Checkouts]
      summary: Retrieve a checkout session
      description: Retrieves the details of an existing checkout session.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: The checkout session object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponseWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/orders:
    get:
      operationId: listOrders
      tags: [Orders]
      summary: List all orders
      description: Returns a paginated list of your orders. Orders are created when a checkout session is completed.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
          description: Filter by order status
        - name: productId
          in: query
          required: false
          schema:
            type: string
          description: Filter by product ID
        - name: startDate
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: "Filter orders created on or after this time (Unix timestamp in milliseconds)"
        - name: endDate
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: "Filter orders created on or before this time (Unix timestamp in milliseconds)"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: A paginated list of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponseWrapper"
              example:
                code: 0
                message: "success"
                data:
                  items:
                    - id: "order_def456"
                      productId: "prod_abc123"
                      customerEmail: "customer@example.com"
                      customerName: null
                      amount: "9.99"
                      currency: "USD"
                      platformFeeRate: "0.04"
                      platformFee: "0.40"
                      netAmount: "9.59"
                      settledAmount: "9.59"
                      settledCurrency: "USD"
                      exchangeRate: null
                      hkdExchangeRate: null
                      paymentMethod: "CREDIT_CARD"
                      status: "PAID"
                      paidAt: 1736932500000
                      settledAt: null
                      metadata:
                        userId: "user_456"
                      createdAt: 1736932200000
                  pagination:
                    page: 1
                    size: 20
                    total: 1
                    totalPages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/orders/{id}:
    get:
      operationId: getOrder
      tags: [Orders]
      summary: Retrieve an order
      description: Retrieves the full details of an existing order, including payment gateway information.
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: The order detail object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponseWrapper"
              example:
                code: 0
                message: "success"
                data:
                  id: "order_def456"
                  checkoutSessionId: "cs_xyz789"
                  productId: "prod_abc123"
                  customerEmail: "customer@example.com"
                  customerName: null
                  amount: "9.99"
                  currency: "USD"
                  platformFeeRate: "0.04"
                  platformFee: "0.40"
                  netAmount: "9.59"
                  settledAmount: "9.59"
                  settledCurrency: "USD"
                  exchangeRate: null
                  hkdExchangeRate: null
                  paymentMethod: "CREDIT_CARD"
                  paymentGateway: "allinpay"
                  gatewayOrderId: "gw_001"
                  gatewayTransactionId: "txn_001"
                  status: "PAID"
                  paidAt: 1736932500000
                  settledAt: null
                  payerIp: "203.0.113.1"
                  metadata:
                    userId: "user_456"
                  createdAt: 1736932200000
                  updatedAt: 1736932500000
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/orders/export:
    get:
      operationId: exportOrders
      tags: [Orders]
      summary: Export orders as CSV
      description: |
        Exports orders within the specified date range as a CSV file.
        Use Unix timestamps (milliseconds) for startDate and endDate.
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: Start of date range (Unix timestamp in milliseconds, inclusive)
        - name: endDate
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: End of date range (Unix timestamp in milliseconds, inclusive)
      responses:
        "200":
          description: CSV file of orders
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/balance:
    get:
      operationId: getBalance
      tags: [Balance]
      summary: Retrieve account balance
      description: Returns the current balance of your merchant account.
      responses:
        "200":
          description: The balance object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponseWrapper"
              example:
                code: 0
                message: "success"
                data:
                  available: "1250.00"
                  pending: "350.00"
                  frozen: "0.00"
                  currency: "USD"
                  updatedAt: 1736932500000
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/balance/transactions:
    get:
      operationId: listBalanceTransactions
      tags: [Balance]
      summary: List balance transactions
      description: Returns a paginated list of balance transactions showing all changes to your account balance.
      parameters:
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BalanceTransactionType"
          description: Filter by transaction type
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: A paginated list of balance transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceTransactionListResponseWrapper"
              example:
                code: 0
                message: "success"
                data:
                  items:
                    - id: "btx_ghi789"
                      type: "PAYMENT"
                      amount: "9.29"
                      currency: "USD"
                      availableAfter: "1250.00"
                      pendingAfter: "350.00"
                      frozenAfter: "0.00"
                      sourceType: "order"
                      sourceId: "order_def456"
                      description: "Payment received for order order_def456"
                      createdAt: 1736932500000
                  pagination:
                    page: 1
                    size: 20
                    total: 1
                    totalPages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"

  /epay/submit.php:
    post:
      operationId: createEpaySubmit
      tags: [Epay Compatibility]
      summary: submit.php (redirect checkout compatibility endpoint)
      description: |
        Creates (or reuses) an Epay-compatible payment and returns HTTP 302 redirect to the hosted payment page.
        This endpoint also accepts GET with the same parameters.

        Signature algorithm:
        1. Remove `sign` and `sign_type`, and drop empty values.
        2. Sort parameters by key in ascending order.
        3. Join as `k=v` with `&`, append merchant API key.
        4. MD5 the final string and compare in lowercase.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/EpaySubmitRequest"
            example:
              pid: "merch_001"
              type: "alipay"
              out_trade_no: "order_20260409001"
              notify_url: "https://merchant.example.com/pay/notify"
              return_url: "https://merchant.example.com/pay/return"
              name: "Pro Plan Subscription"
              money: "99.00"
              money_type: "CNY"
              param: "user_42"
              sign: "fb7f5f742f89eb1f137fbc293f2bf42a"
              sign_type: "MD5"
      responses:
        "302":
          description: Redirect to checkout/payment page
          headers:
            Location:
              description: Redirect target URL
              schema:
                type: string
                format: uri
        "200":
          description: Request rejected (returns compatibility error body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpaySimpleResponse"
              example:
                code: 0
                msg: "签名验证失败"

  /epay/mapi.php:
    post:
      operationId: createEpayMapi
      tags: [Epay Compatibility]
      summary: mapi.php (direct create payment compatibility endpoint)
      description: |
        Creates (or reuses) an order directly and returns Epay-style response fields.
        For QR-style channels, response includes `qrcode` and `img`.
        For redirect-style channels, response includes `payurl`.

        Signature algorithm:
        1. Remove `sign` and `sign_type`, and drop empty values.
        2. Sort parameters by key in ascending order.
        3. Join as `k=v` with `&`, append merchant API key.
        4. MD5 the final string and compare in lowercase.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/EpayMapiRequest"
            example:
              pid: "merch_001"
              type: "wxpay"
              out_trade_no: "order_20260409002"
              notify_url: "https://merchant.example.com/pay/notify"
              return_url: "https://merchant.example.com/pay/return"
              name: "AI Credits 1000"
              money: "9.99"
              money_type: "CNY"
              param: "user_42"
              clientip: "203.0.113.9"
              device: "pc"
              sign: "1ce4f4f5294ec4c95f6b79ff79dbb57b"
              sign_type: "MD5"
      responses:
        "200":
          description: Epay-compatible create payment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpayMapiResponse"
              examples:
                successQr:
                  summary: QR payment response
                  value:
                    code: 1
                    trade_no: "order_epay_001"
                    out_trade_no: "order_20260409002"
                    qrcode: "weixin://wxpay/bizpayurl?pr=xxxx"
                    img: "https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=weixin%3A%2F%2Fwxpay%2Fbizpayurl%3Fpr%3Dxxxx"
                successRedirect:
                  summary: Redirect payment response
                  value:
                    code: 1
                    trade_no: "order_epay_002"
                    out_trade_no: "order_20260409003"
                    payurl: "https://payment.kyren.io/epay/redirect/order_epay_002"
                error:
                  summary: Error response
                  value:
                    code: 0
                    msg: "订单 order_20260409002 正在创建中，请稍后重试"

  /epay/api.php:
    post:
      operationId: callEpayApi
      tags: [Epay Compatibility]
      summary: api.php (order query/refund compatibility endpoint)
      description: |
        Executes compatibility operations with `act`.
        - `act=order`: query order status/result.
        - `act=refund`: currently not supported; returns compatibility error message.

        This endpoint also accepts GET with the same parameters.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/EpayApiRequest"
            examples:
              queryOrder:
                summary: Query by out_trade_no
                value:
                  act: "order"
                  pid: "merch_001"
                  key: "merchant_raw_api_key"
                  out_trade_no: "order_20260409002"
              refund:
                summary: Refund (unsupported currently)
                value:
                  act: "refund"
                  pid: "merch_001"
                  key: "merchant_raw_api_key"
                  trade_no: "order_epay_001"
      responses:
        "200":
          description: Epay-compatible operation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpayApiResponse"
              examples:
                orderSuccess:
                  summary: Successful order query
                  value:
                    code: 1
                    msg: "查询订单号成功！"
                    trade_no: "order_epay_001"
                    out_trade_no: "order_20260409002"
                    type: "wxpay"
                    pid: "merch_001"
                    addtime: "2026-04-09 06:10:20"
                    endtime: "2026-04-09 06:11:08"
                    name: "AI Credits 1000"
                    money: "9.99"
                    status: 1
                    param: "user_42"
                    buyer: ""
                refundUnsupported:
                  summary: Refund not supported
                  value:
                    code: 0
                    msg: "退款功能暂不支持，请联系客服"
                error:
                  summary: Generic error
                  value:
                    code: 0
                    msg: "订单不存在"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Your API key. Use `kyren_live_*` for production and `kyren_test_*` for testing.

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the resource
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number (1-indexed)
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of items per page

  responses:
    BadRequest:
      description: Bad request — invalid parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 400
            message: "Bad Request"
            error:
              field: "productId"
              reason: "Product ID is required"
    Unauthorized:
      description: Unauthorized — missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 401
            message: "Unauthorized"
    NotFound:
      description: Not found — the requested resource does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 404
            message: "Not Found"

  schemas:
    # --- Enums ---
    ProductStatus:
      type: string
      enum: [ACTIVE, ARCHIVED]
      description: |
        - `ACTIVE` — Product is available for checkout
        - `ARCHIVED` — Product is archived and cannot be used

    CheckoutStatus:
      type: string
      enum: [OPEN, COMPLETE, EXPIRED]
      description: |
        - `OPEN` — Checkout session is awaiting payment
        - `COMPLETE` — Payment has been completed
        - `EXPIRED` — Checkout session has expired (30 minutes)

    OrderStatus:
      type: string
      enum: [PENDING, PAID, SETTLED, REFUNDED, DISPUTED, FAILED, CLOSED, REVOKED]
      description: |
        - `PENDING` — Order created, awaiting payment confirmation
        - `PAID` — Payment confirmed
        - `SETTLED` — Funds settled to merchant balance
        - `REFUNDED` — Order has been refunded
        - `DISPUTED` — Order is under dispute
        - `FAILED` — Payment failed
        - `CLOSED` — Order closed (expired or unpaid)
        - `REVOKED` — Order has been revoked

    PaymentMethod:
      type: string
      enum: [CREDIT_CARD, WECHAT_PAY, ALIPAY, PAYNOW]
      description: The payment method used by the customer

    BalanceTransactionType:
      type: string
      enum: [PAYMENT, SETTLEMENT, PAYOUT, FREEZE, UNFREEZE, CHARGEBACK, REFUND, FEE]
      description: |
        - `PAYMENT` — Payment received (added to pending)
        - `SETTLEMENT` — Funds settled (pending → available)
        - `PAYOUT` — Payout deducted from available
        - `FREEZE` / `UNFREEZE` — Funds frozen or released
        - `CHARGEBACK` — Chargeback deduction
        - `REFUND` — Refund deduction
        - `FEE` — Fee deduction

    # --- Request Schemas ---
    CreateProductRequest:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          maxLength: 200
          description: The name of the product
        description:
          type: string
          maxLength: 1000
          description: A description of the product
        image:
          type: string
          description: URL of the product image
        price:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          description: The price of the product (e.g. "9.99"), must be at least 0.01
        currency:
          type: string
          default: "USD"
          description: Three-letter ISO currency code (e.g. USD, CNY, HKD)
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value pairs for your own use

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        image:
          type: string
        price:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        currency:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string

    CreateCheckoutRequest:
      type: object
      required: [productId, successUrl]
      properties:
        productId:
          type: string
          description: The ID of the product to create a checkout for
        successUrl:
          type: string
          format: uri
          description: URL to redirect the customer to after successful payment
        cancelUrl:
          type: string
          format: uri
          description: URL to redirect the customer to if they cancel the payment
        customerEmail:
          type: string
          format: email
          description: Pre-fill the customer's email on the checkout page
        customerName:
          type: string
          description: Pre-fill the customer's name on the checkout page
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary key-value pairs attached to the checkout and resulting order

    EpaySignType:
      type: string
      enum: [MD5]
      description: Signature type. Current compatibility implementation only supports MD5.

    EpayPaymentType:
      type: string
      enum: [alipay, wxpay, creditcard, crypto, paynow]
      description: Payment channel type in Epay compatibility mode.

    EpaySubmitRequest:
      type: object
      required: [pid, type, out_trade_no, notify_url, return_url, name, money, sign, sign_type]
      properties:
        pid:
          type: string
          description: Merchant ID
        type:
          $ref: "#/components/schemas/EpayPaymentType"
        out_trade_no:
          type: string
          description: Merchant order number (must be unique under one merchant)
        notify_url:
          type: string
          format: uri
          description: Merchant async callback URL
        return_url:
          type: string
          format: uri
          description: Merchant sync return URL
        name:
          type: string
          description: Product name
        money:
          type: string
          description: Order amount, decimal string, must be greater than 0
        money_type:
          type: string
          default: CNY
          description: Currency code. Defaults to CNY when omitted.
        param:
          type: string
          description: Pass-through parameter returned in callbacks and order queries
        sign:
          type: string
          description: Lowercase MD5 signature
        sign_type:
          $ref: "#/components/schemas/EpaySignType"

    EpayMapiRequest:
      type: object
      required: [pid, type, out_trade_no, notify_url, name, money, clientip, sign, sign_type]
      properties:
        pid:
          type: string
          description: Merchant ID
        type:
          $ref: "#/components/schemas/EpayPaymentType"
        out_trade_no:
          type: string
          description: Merchant order number (must be unique under one merchant)
        notify_url:
          type: string
          format: uri
          description: Merchant async callback URL
        return_url:
          type: string
          format: uri
          description: Merchant sync return URL
        name:
          type: string
          description: Product name
        money:
          type: string
          description: Order amount, decimal string, must be greater than 0
        money_type:
          type: string
          default: CNY
          description: Currency code. Defaults to CNY when omitted.
        param:
          type: string
          description: Pass-through parameter returned in callbacks and order queries
        clientip:
          type: string
          description: Client IP address
        device:
          type: string
          default: pc
          description: Device identifier passed to gateway (e.g. pc)
        channel_param:
          type: string
          description: |
            Optional JSON string for channel-specific fields.
            Credit card mode supports fields such as:
            `cardNo`, `cardExpireMonth`, `cardExpireYear`, `cardSecurityCode`,
            `billFirstName`, `billLastName`, `billPhone`, `billAddress`,
            `billCountry`, `billState`, `billCity`, `billZip`, `email`.
        sign:
          type: string
          description: Lowercase MD5 signature
        sign_type:
          $ref: "#/components/schemas/EpaySignType"

    EpayApiRequest:
      type: object
      required: [act, pid, key]
      properties:
        act:
          type: string
          enum: [order, refund]
          description: API action. `refund` currently returns unsupported message.
        pid:
          type: string
          description: Merchant ID
        key:
          type: string
          description: Merchant raw API key (not encrypted key)
        out_trade_no:
          type: string
          description: Merchant order number. Required when `trade_no` is not provided.
        trade_no:
          type: string
          description: Platform order ID. Required when `out_trade_no` is not provided.

    EpaySimpleResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [0]
        msg:
          type: string

    EpayMapiSuccessResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [1]
        trade_no:
          type: string
          description: Platform order ID
        out_trade_no:
          type: string
          description: Merchant order number
        payurl:
          type: string
          nullable: true
          description: Redirect URL for browser/app payment flows
        qrcode:
          type: string
          nullable: true
          description: QR code payload or H5 payment URL depending on channel
        img:
          type: string
          nullable: true
          description: QR image URL generated from `qrcode`

    EpayMapiResponse:
      oneOf:
        - $ref: "#/components/schemas/EpayMapiSuccessResponse"
        - $ref: "#/components/schemas/EpaySimpleResponse"

    EpayOrderQuerySuccessResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [1]
        msg:
          type: string
        trade_no:
          type: string
        out_trade_no:
          type: string
        type:
          $ref: "#/components/schemas/EpayPaymentType"
        pid:
          type: string
        addtime:
          type: string
          description: UTC datetime string, format `yyyy-MM-dd HH:mm:ss`
        endtime:
          type: string
          description: UTC datetime string, empty when unpaid
        name:
          type: string
        money:
          type: string
        status:
          type: integer
          enum: [0, 1]
          description: 1 means paid/settled; 0 means not paid
        param:
          type: string
        buyer:
          type: string
          description: Reserved field, currently empty string

    EpayApiResponse:
      oneOf:
        - $ref: "#/components/schemas/EpayOrderQuerySuccessResponse"
        - $ref: "#/components/schemas/EpaySimpleResponse"

    # --- Response Schemas ---
    Product:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier
        name:
          type: string
        description:
          type: string
        image:
          type: string
        price:
          type: string
        currency:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
        metadata:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds

    Checkout:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier
        productId:
          type: string
        amount:
          type: string
          description: Order amount (e.g. "9.99")
        currency:
          type: string
        status:
          $ref: "#/components/schemas/CheckoutStatus"
        url:
          type: string
          format: uri
          description: The URL to redirect the customer to for payment
        expiresAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds

    Order:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        customerEmail:
          type: string
        customerName:
          type: string
        amount:
          type: string
        currency:
          type: string
        platformFeeRate:
          type: string
          description: Platform fee rate (e.g. "0.04" for 4%)
        platformFee:
          type: string
          description: Platform fee charged by Kyren Pay
        netAmount:
          type: string
          description: Net amount after fees (amount - platformFee - paymentFee)
        settledAmount:
          type: string
          nullable: true
          description: Net amount converted to USD for settlement
        settledCurrency:
          type: string
          description: Settlement currency, always "USD"
        exchangeRate:
          type: string
          nullable: true
          description: Exchange rate used for currency conversion (null if payment currency is USD)
        hkdExchangeRate:
          type: string
          nullable: true
          description: Exchange rate from payment currency to HKD used by the payment gateway (null for HKD orders)
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        status:
          $ref: "#/components/schemas/OrderStatus"
        paidAt:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp in milliseconds, null if not paid
        settledAt:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp in milliseconds, null if not settled
        metadata:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds

    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            checkoutSessionId:
              type: string
            paymentGateway:
              type: string
            gatewayOrderId:
              type: string
            gatewayTransactionId:
              type: string
              nullable: true
            payerIp:
              type: string
              nullable: true
            updatedAt:
              type: integer
              format: int64
              description: Unix timestamp in milliseconds

    Balance:
      type: object
      properties:
        available:
          type: string
          description: Funds available for payout
        pending:
          type: string
          description: Funds awaiting settlement
        frozen:
          type: string
          description: Funds currently frozen
        currency:
          type: string
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds

    CurrencyOption:
      type: object
      properties:
        code:
          type: string
          description: Three-letter ISO currency code (e.g. USD, CNY, HKD)
        label:
          type: string
          description: Display label for the currency

    CurrenciesResponse:
      type: object
      properties:
        currencies:
          type: array
          items:
            $ref: "#/components/schemas/CurrencyOption"
          description: List of supported currencies
        defaultCurrency:
          type: string
          description: The default currency code used when none is specified

    BalanceTransaction:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/BalanceTransactionType"
        amount:
          type: string
          description: Amount change (positive for increase, negative for decrease)
        currency:
          type: string
        availableAfter:
          type: string
          description: Available balance after this transaction
        pendingAfter:
          type: string
        frozenAfter:
          type: string
        sourceType:
          type: string
          description: "Type of the source resource (e.g. order, payout)"
        sourceId:
          type: string
          description: ID of the source resource
        description:
          type: string
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds

    # --- Pagination ---
    Pagination:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
          format: int64
        totalPages:
          type: integer

    # --- Wrapper Schemas ---
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        error:
          type: object
          properties:
            field:
              type: string
            reason:
              type: string

    EmptyResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"

    ProductResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          $ref: "#/components/schemas/Product"

    ProductListResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Product"
            pagination:
              $ref: "#/components/schemas/Pagination"

    CheckoutResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          $ref: "#/components/schemas/Checkout"

    OrderListResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Order"
            pagination:
              $ref: "#/components/schemas/Pagination"

    OrderDetailResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          $ref: "#/components/schemas/OrderDetail"

    BalanceResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          $ref: "#/components/schemas/Balance"

    CurrenciesResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          $ref: "#/components/schemas/CurrenciesResponse"

    BalanceTransactionListResponseWrapper:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/BalanceTransaction"
            pagination:
              $ref: "#/components/schemas/Pagination"
